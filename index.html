<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Elaine Nails | Oficial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary: #d4a373;
            --bg: #faf9f6;
            --text: #2c2c2c;
            --white: #ffffff;
            --accent: #e9edc9;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            cursor: pointer;
            user-select: none;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            margin: 0;
        }

        .data-container {
            background: var(--white);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
        }

        label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--primary);
            display: block;
            margin-bottom: 10px;
        }

        input[type="date"] {
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 8px;
            font-family: 'Poppins';
            width: 100%;
            max-width: 250px;
            cursor: pointer;
            outline: none;
        }

        .agenda-dia {
            background: var(--white);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            border-top: 5px solid var(--primary);
            text-align: left;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: var(--primary);
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-top: 0;
        }

        .turno-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #b5b5b5;
            display: block;
            margin: 15px 0 5px;
        }

        .horario-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f9f9f9;
        }

        .btn-agendar {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .btn-agendar:hover {
            background: #bc8a5f;
        }

        #painel-admin {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background: #fff;
            border-radius: 15px;
            border: 2px dashed var(--primary);
            text-align: left;
        }

        .admin-item {
            background: #fdfaf6;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid var(--primary);
            font-size: 0.9rem;
            position: relative;
        }

        .btn-excluir {
            position: absolute;
            right: 10px;
            top: 10px;
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.7rem;
            padding: 5px;
        }

        .btn-ver-comprovante {
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.75rem;
            padding: 4px 8px;
            margin-top: 5px;
            display: inline-block;
        }

        #modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            margin: 15px 0 5px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .alerta-pix {
            background: #fff8f0;
            border: 1px dashed #d4a373;
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            font-size: 0.8rem;
            color: #555;
            text-align: left;
            line-height: 1.4;
        }

        .upload-container {
            margin: 15px 0;
            text-align: left;
        }

        .upload-label {
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--primary);
            display: block;
            margin-bottom: 5px;
        }

        input[type="file"] {
            font-size: 0.8rem;
            width: 100%;
        }
    </style>
</head>

<body>

    <div class="container">
        <header onclick="ativarAdmin()">
            <p style="letter-spacing: 3px; color: var(--primary); font-weight: 600; font-size: 0.7rem;">STUDIO DE BELEZA
            </p>
            <h1>Elaine Nails</h1>
        </header>

        <div class="data-container">
            <label for="dataSelecao">Escolha o dia do atendimento:</label>
            <input type="date" id="dataSelecao" onchange="atualizarAgenda()">
        </div>

        <div id="agenda-espaco" class="agenda-dia" style="display:none;">
            <h2 id="dia-titulo"></h2>
            <div id="horarios"></div>
        </div>

        <div id="painel-admin">
            <h2 style="font-size: 1.2rem;">Relatório de Agendamentos</h2>
            <div id="lista-admin"></div>
            <button onclick="document.getElementById('painel-admin').style.display='none'"
                style="width:100%; margin-top:10px; cursor:pointer;">Fechar Painel</button>
        </div>
    </div>

    <div id="modal">
        <form class="modal-content" onsubmit="confirmar(event)">
            <h3 id="modal-titulo" style="font-family: 'Playfair Display'; margin: 0;"></h3>
            <p id="modal-subtitulo" style="font-size: 0.85rem; color: #777; margin-top: 5px; font-weight: bold;"></p>

            <input type="text" id="nomeCliente" class="modal-input" placeholder="Seu nome completo">

            <div class="alerta-pix">
                📌 <strong>Taxa de Reserva: R$ 5,00</strong><br>
                O valor será descontado no dia do atendimento.<br><br>
                🔑 <strong>Chave Pix (Telefone):</strong> (61) 99535-0182
            </div>

            <div class="upload-container">
                <label class="upload-label" for="fotoComprovante">📸 Anexe o print do comprovante aqui:</label>
                <input type="file" id="fotoComprovante" accept="image/*">
            </div>

            <button type="submit" id="btnConfirmarGeral" class="btn-agendar"
                style="width: 100%; padding: 12px;">Confirmar Agendamento</button>
            <button type="button"
                style="background:none; border:none; color: grey; cursor:pointer; margin-top:15px; font-size: 0.8rem;"
                onclick="fechar()">Voltar</button>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAUlaR2X9R--KUpuxvS-q9y9W8WnCWoqxA",
            authDomain: "agenda-elaine-nails-default-rtdb.firebaseapp.com",
            databaseURL: "https://agenda-elaine-nails-default-rtdb.firebaseio.com",
            projectId: "agenda-elaine-nails",
            storageBucket: "agenda-elaine-nails.appspot.com",
            messagingSenderId: "706235045858",
            appId: "1:706235045858:web:18340961bbee014f70cbbb"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const turnos = [{ label: "Manhã", i: 8, f: 12 }, { label: "Tarde", i: 13, f: 18 }];
        let idGlobal = null;
        let cliquesAdmin = 0;

        function ativarAdmin() {
            cliquesAdmin++;
            if (cliquesAdmin >= 5) {
                document.getElementById('painel-admin').style.display = 'block';
                carregarAdmin();
                alert("Modo Administrador Ativado!");
                cliquesAdmin = 0;
            }
        }

        function atualizarAgenda() {
            const input = document.getElementById('dataSelecao');
            if (!input.value) return;

            const dataObj = new Date(input.value + 'T00:00:00');
            if (dataObj.getDay() === 0) {
                alert("Não atendemos aos domingos.");
                document.getElementById('agenda-espaco').style.display = 'none';
                return;
            }

            document.getElementById('agenda-espaco').style.display = 'block';
            const diasNomes = ["Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"];
            document.getElementById('dia-titulo').innerText = diasNomes[dataObj.getDay()];

            const container = document.getElementById('horarios');
            container.innerHTML = "";

            database.ref('agendamentos').once('value').then((snapshot) => {
                const agendados = snapshot.val() || {};

                turnos.forEach(t => {
                    container.innerHTML += `<span class="turno-label">${t.label}</span>`;
                    for (let h = t.i; h < t.f; h++) {
                        let chave = `${input.value}_${h}:00`;
                        let ocupado = agendados[chave];

                        let nomeExibir = ocupado ? (typeof ocupado === 'object' ? ocupado.nome : ocupado) : "";

                        container.innerHTML += `
                        <div class="horario-item">
                            <span>${h}:00</span>
                            <div>
                                ${ocupado ? `<span style="color:#b5b5b5; font-size:0.75rem;">Reservado (${nomeExibir})</span>`
                                : `<button type="button" class="btn-agendar" onclick="abrirModal('${chave}', '${h}:00')">Agendar</button>`}
                            </div>
                        </div>`;
                    }
                });
            });
        }

        function abrirModal(chave, hora) {
            idGlobal = chave;
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('modal-titulo').innerText = "Solicitar Horário";
            document.getElementById('modal-subtitulo').innerText = `Horário: ${hora}`;
        }

        function fechar() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('nomeCliente').value = "";
            document.getElementById('fotoComprovante').value = "";
            document.getElementById('btnConfirmarGeral').innerText = "Confirmar Agendamento";
            document.getElementById('btnConfirmarGeral').disabled = false;
        }

        // COMPACTA A FOTO E SALVA SEM RECARREGAR A TELA
        function confirmar(event) {
            if (event) event.preventDefault();

            const nome = document.getElementById('nomeCliente').value;
            const arquivoInput = document.getElementById('fotoComprovante');
            const botao = document.getElementById('btnConfirmarGeral');

            if (!nome) return alert("Por favor, digite seu nome.");
            if (arquivoInput.files.length === 0) return alert("Por favor, anexe a imagem do comprovante do Pix para concluir.");

            botao.innerText = "Enviando... Aguarde";
            botao.disabled = true;

            const arquivo = arquivoInput.files[0];
            const reader = new FileReader();

            reader.onloadend = function () {
                const img = new Image();
                img.src = reader.result;

                img.onload = function () {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');

                    const max_width = 600;
                    let width = img.width;
                    let height = img.height;

                    if (width > max_width) {
                        height = Math.round((height * max_width) / width);
                        width = max_width;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);

                    const base64ImagemCompacta = canvas.toDataURL('image/jpeg', 0.6);

                    const dadosAgendamento = {
                        nome: nome,
                        comprovante: base64ImagemCompacta
                    };

                    database.ref('agendamentos/' + idGlobal).set(dadosAgendamento)
                        .then(() => {
                            alert("Sucesso! Seu agendamento e comprovante foram enviados. Aguarde a validação no dia do atendimento.");
                            fechar();
                            atualizarAgenda();
                            if (document.getElementById('painel-admin').style.display === 'block') carregarAdmin();
                        })
                        .catch((error) => {
                            alert("Erro ao salvar: " + error.message);
                            botao.innerText = "Confirmar Agendamento";
                            botao.disabled = false;
                        });
                };
            };

            reader.readAsDataURL(arquivo);
        }

        function carregarAdmin() {
            const lista = document.getElementById('lista-admin');
            lista.innerHTML = "";

            database.ref('agendamentos').once('value').then((snapshot) => {
                const agendados = snapshot.val() || {};
                const chaves = Object.keys(agendados).sort();

                if (chaves.length === 0) {
                    lista.innerHTML = "<p>Nenhum agendamento encontrado.</p>";
                    return;
                }

                chaves.forEach(chave => {
                    const [data, hora] = chave.split('_');
                    let info = agendados[chave];

                    let nomeCliente = typeof info === 'object' ? info.nome : info;
                    let temComprovante = typeof info === 'object' && info.comprovante;

                    let htmlItem = `
                    <div class="admin-item">
                        <strong>${data.split('-').reverse().join('/')} às ${hora}</strong><br>
                        Cliente: ${nomeCliente}<br>
                        ${temComprovante ? `<button type="button" class="btn-ver-comprovante" onclick="verFoto('${chave}')">👁️ Ver Comprovante</button>` : ''}
                        <button type="button" class="btn-excluir" onclick="remover('${chave}')">Excluir</button>
                    </div>`;

                    lista.innerHTML += htmlItem;
                });
            });
        }

        function verFoto(chave) {
            database.ref('agendamentos/' + chave).once('value').then((snapshot) => {
                const info = snapshot.val();
                if (info && info.comprovante) {
                    const novaAba = window.open();
                    novaAba.document.write(`<img src="${info.comprovante}" style="max-width:100%; height:auto;" alt="Comprovante Pix">`);
                } else {
                    alert("Comprovante não encontrado.");
                }
            });
        }

        function remover(chave) {
            if (confirm("Deseja cancelar este agendamento?")) {
                database.ref('agendamentos/' + chave).remove()
                    .then(() => {
                        carregarAdmin();
                        atualizarAgenda();
                    });
            }
        }
    </script>
</body>

</html>
